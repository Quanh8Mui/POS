<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .register-card { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px;}
    </style>
</head>
<body>
    <div class="register-card shadow">
    <h3 class="text-center fw-bold text-primary mb-4">ĐĂNG KÝ THÀNH VIÊN</h3>
    <form id="register-form">
        <div class="mb-3">
            <label class="form-label small fw-bold">Họ và tên</label>
            <input type="text" id="reg-name" class="form-control" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Số điện thoại</label>
            <input type="text" id="reg-phone" class="form-control" placeholder="09xxxxxxxx" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Mật khẩu</label>
            <input type="password" id="reg-pass" class="form-control" placeholder="******" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-3">HOÀN TẤT ĐĂNG KÝ</button>
        <p class="text-center mt-3 small">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
    </form>
   <script>
document.getElementById('register-form').onsubmit = function(e) {
    e.preventDefault();
    
    const userData = {
        name: document.getElementById('reg-name').value,
        phone: document.getElementById('reg-phone').value,
        pass: document.getElementById('reg-pass').value,
        points: 0
    };
    let allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
    if (allUsers.some(user => user.phone === userData.phone)) {
        alert("Số điện thoại này đã được đăng ký!");
        return;
    }
    allUsers.push(userData);
    localStorage.setItem('allUsers', JSON.stringify(allUsers));
    localStorage.setItem('currentUser', JSON.stringify(userData));

    alert("Đăng ký thành công! Chào mừng " + userData.name);
    window.location.href = 'index.html';
};
</script>
</div>
</body>
</html>
