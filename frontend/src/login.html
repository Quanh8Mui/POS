<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="login-card">
    <h3 class="text-center fw-bold text-primary mb-4">ĐĂNG NHẬP</h3>
    <form id="login-form">
        <div class="mb-3">
            <label class="form-label small fw-bold">Số điện thoại</label>
            <input type="text" id="login-phone" class="form-control" placeholder="Nhập SĐT đã đăng ký" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Mật khẩu</label>
            <input type="password" id="login-pass" class="form-control" placeholder="******" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-3">ĐĂNG NHẬP NGAY</button>
        <p class="text-center mt-3 small">Chưa có tài khoản? <a href="register.html">Đăng ký tại đây</a></p>
    </form>
</div>

<script>
document.getElementById('login-form').onsubmit = function(e) {
    e.preventDefault();

    const phone = document.getElementById('login-phone').value;
    const pass = document.getElementById('login-pass').value;
    const allUsers = JSON.parse(localStorage.getItem('allUsers')) || [];
    const user = allUsers.find(u => u.phone === phone && u.pass === pass);

    if (user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
        alert("Đăng nhập thành công! Chào " + user.name);
        window.location.href = 'index.html';
    } else {
        alert("Sai số điện thoại hoặc mật khẩu!");
    }
};
</script>
</body>
</html>
