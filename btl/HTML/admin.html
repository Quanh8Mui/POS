<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="D:/BTL/CSS/admin.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>ADMIN POS</h2>

        <ul>
            <li onclick="showSection('dashboard')">
                Dashboard
            </li>

            <li onclick="showSection('price')">
                Cấu Hình Giá
            </li>

            <li onclick="showSection('branch')">
                Quản Lý Chi Nhánh
            </li>
        </ul>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- DASHBOARD -->
        <section id="dashboard" class="section active">

            <h1>Dashboard Doanh Số</h1>

            <div class="cards">

                <div class="card green">
                    <h3>Doanh Thu</h3>
                    <p>125.000.000đ</p>
                </div>

                <div class="card blue">
                    <h3>Đơn Hàng</h3>
                    <p>1.245</p>
                </div>

                <div class="card purple">
                    <h3>Khách Hàng</h3>
                    <p>530</p>
                </div>

                <div class="card orange">
                    <h3>Lợi Nhuận</h3>
                    <p>38.000.000đ</p>
                </div>

            </div>

            <!-- CHART -->
            <div class="chart-container">

                <canvas id="myChart"></canvas>

            </div>

        </section>

        <!-- PRICE -->
        <section id="price" class="section">

            <h1>Cấu Hình Giá</h1>

            <div class="form-box">

                <select>
    <option disabled selected>
        Chọn sản phẩm
    </option>

    <option>Coca Cola</option>

    <option>Pepsi</option>

    <option>Snack Lay's</option>

    <option>Bánh Oreo</option>

</select>

                <input type="number" placeholder="Giá mới">

                <button>Cập Nhật</button>

            </div>

        </section>

        <!-- BRANCH -->
        <section id="branch" class="section">

            <h1>Quản Lý Chi Nhánh</h1>

            <div class="form-box">

                <input type="text" placeholder="Tên chi nhánh">

                <input type="text" placeholder="Địa chỉ">

                <button>Thêm Chi Nhánh</button>

            </div>

            <table>

                <tr>
                    <th>Chi Nhánh</th>
                    <th>Địa Chỉ</th>
                    <th>Trạng Thái</th>
                </tr>

                <tr>
                    <td>Gò Vấp</td>
                    <td>12 Nguyễn Văn Bảo</td>
                    <td>Hoạt động</td>
                </tr>

                <tr>
                    <td>Bình Thạnh</td>
                    <td>25 XVNT</td>
                    <td>Hoạt động</td>
                </tr>

            </table>

        </section>

    </div>
    

    <script>

        function showSection(id){

            let sections =
                document.querySelectorAll('.section');

            sections.forEach(sec => {
                sec.classList.remove('active');
            });

            document.getElementById(id)
                .classList.add('active');
        }

        // CHART
        const ctx =
            document.getElementById('myChart');

        new Chart(ctx, {

            type: 'bar',

            data: {

                labels: [
                    'T1',
                    'T2',
                    'T3',
                    'T4',
                    'T5',
                    'T6'
                ],

                datasets: [{

                    label: 'Doanh Thu',

                    data: [
                        12,
                        19,
                        15,
                        25,
                        30,
                        24
                    ],

                    backgroundColor: [
                        '#3498db',
                        '#27ae60',
                        '#9b59b6',
                        '#f1c40f',
                        '#e67e22',
                        '#e74c3c'
                    ]
                }]
            },

            options: {
                responsive: true,
                maintainAspectRatio: false
            }

        });

    </script>

</body>
</html>
